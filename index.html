<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conquer It | Quest Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚔️ Conquer It</h1>
            <p>Enter your main objective. The Quest Master will break it down.</p>
        </header>

        <div class="input-section">
            <input type="text" id="main-quest-input" placeholder="e.g., Build a portfolio website...">
            <button id="generate-btn">Generate Quests</button>
        </div>

        <div id="loading" class="hidden">Consulting the Quest Master...</div>
        <div id="quest-board" class="hidden">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
